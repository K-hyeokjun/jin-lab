apiVersion: apps/v1
kind: Deployment
metadata:
  name: new-app-b
  namespace: app-b
  annotations:
    build-number: '0'
spec:
  replicas: 1
  selector:
    matchLabels:
      app: new-app-b
  template:
    metadata:
      labels:
        app: new-app-b
    spec:
      containers:
      - name: new-app-b
        image: nginx:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: new-app-b
  namespace: app-b
spec:
  selector:
    app: new-app-b
  ports:
  - port: 80
    targetPort: 80
